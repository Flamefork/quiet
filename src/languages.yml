COFFEESCRIPT.:
  keys: BLOCK_COMMENT BOOLEAN BRACE BRACKET ESCAPE_SEQUENCE EXPRESSIONS_SUBSTITUTION_MARK FUNCTION FUNCTION_BINDING FUNCTION_NAME GLOBAL_VARIABLE HEREDOC_CONTENT HEREDOC_ID HEREGEX_CONTENT HEREGEX_ID JAVASCRIPT_CONTENT JAVASCRIPT_ID KEYWORD LINE_COMMENT LOCAL_VARIABLE NUMBER PARENTHESIS REGULAR_EXPRESSION_CONTENT REGULAR_EXPRESSION_FLAG REGULAR_EXPRESSION_ID STRING STRING_LITERAL THIS
  foreground:
    variable: GLOBAL_VARIABLE LOCAL_VARIABLE THIS
    keyword: BRACE BRACKET FUNCTION FUNCTION_BINDING KEYWORD PARENTHESIS
    comment: BLOCK_COMMENT LINE_COMMENT
    string: STRING STRING_LITERAL

CSS.:
  keys:
    COMMENT FUNCTION IDENT IMPORTANT KEYWORD NUMBER PROPERTY_NAME PROPERTY_VALUE STRING TAG_NAME URL
  foreground:
    variable: PROPERTY_NAME
    keyword: KEYWORD
    comment: COMMENT
    string: IMPORTANT

CUSTOM_:
  keys: INVALID_STRING_ESCAPE_ATTRIBUTES KEYWORD1_ATTRIBUTES KEYWORD2_ATTRIBUTES KEYWORD3_ATTRIBUTES KEYWORD4_ATTRIBUTES LINE_COMMENT_ATTRIBUTES MULTI_LINE_COMMENT_ATTRIBUTES NUMBER_ATTRIBUTES STRING_ATTRIBUTES VALID_STRING_ESCAPE_ATTRIBUTES
  foreground:
    keyword: KEYWORD1_ATTRIBUTES KEYWORD2_ATTRIBUTES KEYWORD3_ATTRIBUTES KEYWORD4_ATTRIBUTES
    comment: LINE_COMMENT_ATTRIBUTES MULTI_LINE_COMMENT_ATTRIBUTES
    string: STRING_ATTRIBUTES
  background:
    error_bg: INVALID_STRING_ESCAPE_ATTRIBUTES

ERL_:
  keys: BOLD BRACES BRACKETS COMMENT ILLEGAL KEYWORD NUMBER PARENTHS STRING VARIABLES
  foreground:
    variable: VARIABLES
    keyword: BRACES BRACKETS KEYWORD PARENTHS
    comment: BOLD COMMENT
    string: STRING
  background:
    error_bg: ILLEGAL

GHERKIN_:
  keys: COMMENT KEYWORD OUTLINE_PARAMETER_SUBSTITUTION PYSTRING REGEXP_PARAMETER TABLE_CELL TABLE_HEADER_CELL TABLE_PIPE TAG
  foreground:
    variable: OUTLINE_PARAMETER_SUBSTITUTION REGEXP_PARAMETER TABLE_HEADER_CELL
    keyword: KEYWORD TAG PYSTRING
    comment: COMMENT 

HAML_:
  keys: CLASS COMMENT FILTER FILTER_CONTENT ID LINE_CONTINUATION RUBY_CODE RUBY_START STRING STRING_INTERPOLATED TAG TAG_NAME XHTML
  foreground:
    variable: CLASS ID TAG_NAME
    keyword: TAG XHTML
    comment: COMMENT

HTML_:
  keys: ATTRIBUTE_NAME ATTRIBUTE_VALUE COMMENT ENTITY_REFERENCE TAG TAG_NAME
  foreground:
    variable: ATTRIBUTE_NAME TAG_NAME
    keyword: TAG
    comment: COMMENT

JS.:
  keys: BADCHARACTER BLOCK_COMMENT DOC_COMMENT DOC_MARKUP DOC_TAG GLOBAL_FUNCTION GLOBAL_VARIABLE INSTANCE_MEMBER_FUNCTION INSTANCE_MEMBER_VARIABLE INVALID_STRING_ESCAPE KEYWORD LINE_COMMENT LOCAL_VARIABLE NUMBER PARAMETER REGEXP STATIC_MEMBER_FUNCTION STATIC_MEMBER_VARIABLE STRING VALID_STRING_ESCAPE
  foreground:
    variable: GLOBAL_VARIABLE LOCAL_VARIABLE PARAMETER
    keyword: KEYWORD
    comment: BLOCK_COMMENT DOC_COMMENT LINE_COMMENT
    string: STRING VALID_STRING_ESCAPE REGEXP
  background:
    error_bg: BADCHARACTER INVALID_STRING_ESCAPE

RDOC_:
  keys: DIRECTIVE EMAIL HEADINGS IDENTIFIER KEYWORD URL

RHTML_:
  keys: COMMENT_ID EXPRESSION_END_ID EXPRESSION_START_ID OMIT_NEW_LINE_ID SCRIPTING_BACKGROUND_ID SCRIPTLET_END_ID SCRIPTLET_START_ID
  foreground:
    keyword: EXPRESSION_END_ID EXPRESSION_START_ID OMIT_NEW_LINE_ID SCRIPTLET_END_ID SCRIPTLET_START_ID
    comment: COMMENT_ID

RUBY_:
  keys: BRACKETS COLON COMMA COMMENT CVAR DOT ESCAPE_SEQUENCE EXPR_IN_STRING GVAR HASH_ASSOC HEREDOC_CONTENT HEREDOC_ID INTERPOLATED_STRING IVAR KEYWORD LINE_CONTINUATION LOCAL_VAR_ID METHOD_NAME NTH_REF NUMBER PARAMDEF_CALL PARAMETER_ID REGEXP SEMICOLON SPECIFIC_CALL STRING SYMBOL WORDS
  foreground:
    variable: CVAR IVAR LOCAL_VAR_ID PARAMETER_ID
    keyword: BRACKETS KEYWORD SPECIFIC_CALL
    comment: COMMENT
    string: INTERPOLATED_STRING REGEXP STRING WORDS
    default: HEREDOC_ID

SASS_:
  keys: COMMENT DEFAULT EXTEND FUNCTION IDENTIFIER IMPORTANT KEYWORD MIXIN NUMBER PROPERTY_NAME PROPERTY_VALUE STRING TAG_NAME URL VARIABLE
  foreground:
    variable: VARIABLE
    keyword: EXTEND KEYWORD
    comment: COMMENT
  
SQL_:
  keys: COLUMN COMMENT KEYWORD NUMBER PROCEDURE STRING SYNTETIC_ENTITY
  foreground:
    variable: COLUMN
    keyword: KEYWORD
    comment: COMMENT
    string: STRING

YAML_:
  keys: COMMENT SCALAR_DSTRING SCALAR_KEY SCALAR_LIST SCALAR_STRING
  foreground:
    variable: SCALAR_KEY
    comment: COMMENT

'':
  keys: FOLDED_TEXT_ATTRIBUTES FOLLOWED_HYPERLINK_ATTRIBUTES HYPERLINK_ATTRIBUTES LINE_FULL_COVERAGE LINE_NONE_COVERAGE LINE_PARTIAL_COVERAGE MATCHED_BRACE_ATTRIBUTES TAG_ATTR_KEY TEMPLATE_VARIABLE_ATTRIBUTES TODO_DEFAULT_ATTRIBUTES
  