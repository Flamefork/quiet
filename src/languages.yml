COFFEESCRIPT.:
  keys: BLOCK_COMMENT BOOLEAN BRACE BRACKET ESCAPE_SEQUENCE EXPRESSIONS_SUBSTITUTION_MARK FUNCTION FUNCTION_BINDING FUNCTION_NAME GLOBAL_VARIABLE HEREDOC_CONTENT HEREDOC_ID HEREGEX_CONTENT HEREGEX_ID JAVASCRIPT_CONTENT JAVASCRIPT_ID KEYWORD LINE_COMMENT LOCAL_VARIABLE NUMBER PARENTHESIS REGULAR_EXPRESSION_CONTENT REGULAR_EXPRESSION_FLAG REGULAR_EXPRESSION_ID STRING STRING_LITERAL THIS
  foreground:
    variable: GLOBAL_VARIABLE LOCAL_VARIABLE THIS
    keyword: BRACE BRACKET FUNCTION FUNCTION_BINDING KEYWORD PARENTHESIS
    comment: BLOCK_COMMENT LINE_COMMENT
    string: STRING STRING_LITERAL

CSS.:
  keys:
    COMMENT FUNCTION IDENT IMPORTANT KEYWORD NUMBER PROPERTY_NAME PROPERTY_VALUE STRING TAG_NAME URL
  foreground:
    variable: PROPERTY_NAME
    keyword: KEYWORD
    comment: COMMENT
    string: IMPORTANT

CUSTOM_:
  keys: INVALID_STRING_ESCAPE_ATTRIBUTES KEYWORD1_ATTRIBUTES KEYWORD2_ATTRIBUTES KEYWORD3_ATTRIBUTES KEYWORD4_ATTRIBUTES LINE_COMMENT_ATTRIBUTES MULTI_LINE_COMMENT_ATTRIBUTES NUMBER_ATTRIBUTES STRING_ATTRIBUTES VALID_STRING_ESCAPE_ATTRIBUTES
  foreground:
    keyword: KEYWORD1_ATTRIBUTES KEYWORD2_ATTRIBUTES KEYWORD3_ATTRIBUTES KEYWORD4_ATTRIBUTES
    comment: LINE_COMMENT_ATTRIBUTES MULTI_LINE_COMMENT_ATTRIBUTES
    string: STRING_ATTRIBUTES
  background:
    error_bg: INVALID_STRING_ESCAPE_ATTRIBUTES

ERL_:
  keys: BOLD BRACES BRACKETS COMMENT ILLEGAL KEYWORD NUMBER PARENTHS STRING VARIABLES
  foreground:
    variable: VARIABLES
    keyword: BRACES BRACKETS KEYWORD PARENTHS
    comment: BOLD COMMENT
    string: STRING
  background:
    error_bg: ILLEGAL
